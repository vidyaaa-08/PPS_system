{% extends 'base.html' %}

{% block title %}Create Order{% endblock %}

{% block css %}
<style>
    .create-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 24px 80px;
        animation: fadeUp 0.5s ease-out;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Page Header ─── */
    .page-header {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 36px;
    }

    .header-icon {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--brand) 0%, #7c3aed 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px var(--brand-glow);
        flex-shrink: 0;
    }

    .header-icon i {
        color: #fff;
        font-size: 20px;
    }

    .header-text h2 {
        margin: 0;
        font-size: 26px;
        font-family: 'Space Grotesk', sans-serif;
        color: var(--nav);
        font-weight: 700;
        letter-spacing: -0.3px;
    }

    .header-text p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
    }

    /* ─── Form Card ─── */
    .form-card {
        background: var(--surface);
        border-radius: 20px;
        box-shadow: 0 4px 24px rgba(16,24,40,0.05), 0 0 0 1px rgba(0,0,0,0.03);
        padding: 36px;
        border: 1px solid rgba(0,0,0,0.04);
    }

    /* ─── Section Dividers ─── */
    .form-section {
        margin-bottom: 32px;
    }

    .form-section:last-of-type {
        margin-bottom: 0;
    }

    .section-label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #f1f5f9;
    }

    .section-label .sec-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
    }

    .section-label:nth-child(1) .sec-icon,
    .form-section:nth-child(1) .sec-icon {
        background: #eef2ff;
        color: var(--brand);
    }

    .section-label .sec-text {
        font-size: 13px;
        font-weight: 700;
        color: var(--nav);
        font-family: 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* ─── Form Grid ─── */
    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-grid .full-width {
        grid-column: 1 / -1;
    }

    /* ─── Input Groups ─── */
    .input-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .input-group label {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .input-group label .req {
        color: #ef4444;
        font-size: 11px;
    }

    .input-group input,
    .input-group select {
        padding: 12px 16px;
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        color: var(--nav);
        background: #f8fafc;
        transition: all 0.25s ease;
        font-family: 'Space Grotesk', sans-serif;
        outline: none;
        width: 100%;
        -webkit-appearance: none;
    }

    .input-group input::placeholder {
        color: #94a3b8;
        font-weight: 400;
    }

    .input-group input:hover,
    .input-group select:hover {
        border-color: #cbd5e1;
        background: #fff;
    }

    .input-group input:focus,
    .input-group select:focus {
        border-color: var(--brand);
        background: #fff;
        box-shadow: 0 0 0 3px var(--brand-glow), 0 2px 8px rgba(99,102,241,0.08);
    }

    /* Select arrow */
    .select-wrap {
        position: relative;
    }

    .select-wrap::after {
        content: '\f107';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 12px;
        pointer-events: none;
    }

    .select-wrap select {
        padding-right: 36px;
        cursor: pointer;
    }

    /* ─── Quantity Stepper ─── */
    .qty-stepper {
        display: flex;
        align-items: center;
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        background: #f8fafc;
        overflow: hidden;
        transition: all 0.25s ease;
    }

    .qty-stepper:hover {
        border-color: #cbd5e1;
        background: #fff;
    }

    .qty-stepper:focus-within {
        border-color: var(--brand);
        background: #fff;
        box-shadow: 0 0 0 3px var(--brand-glow);
    }

    .qty-btn {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        font-size: 16px;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
    }

    .qty-btn:hover {
        color: var(--brand);
        background: #eef2ff;
    }

    .qty-stepper input {
        border: none !important;
        border-radius: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        text-align: center;
        padding: 12px 4px !important;
        font-weight: 700;
        font-size: 15px;
        -moz-appearance: textfield;
    }

    .qty-stepper input::-webkit-outer-spin-button,
    .qty-stepper input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    /* ─── Date Input ─── */
    .input-group input[type="date"] {
        cursor: pointer;
    }

    .input-group input[type="date"]::-webkit-calendar-picker-indicator {
        opacity: 0.5;
        cursor: pointer;
    }

    /* ─── Submit Area ─── */
    .submit-area {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        margin-top: 36px;
        padding-top: 28px;
        border-top: 1px solid #f1f5f9;
    }

    .btn-cancel {
        padding: 12px 24px;
        border-radius: 12px;
        border: 1.5px solid #e5e7eb;
        background: #fff;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        font-family: 'Space Grotesk', sans-serif;
        cursor: pointer;
        transition: all 0.25s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-cancel:hover {
        border-color: #cbd5e1;
        color: var(--nav);
        background: #f8fafc;
    }

    .btn-submit {
        padding: 12px 32px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, var(--brand) 0%, #7c3aed 100%);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Space Grotesk', sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        box-shadow: 0 4px 16px var(--brand-glow);
        display: inline-flex;
        align-items: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
    }

    .btn-submit::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
        transform: translateX(-100%);
        transition: transform 0.5s ease;
    }

    .btn-submit:hover::before {
        transform: translateX(100%);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px var(--brand-glow);
    }

    .btn-submit:active {
        transform: translateY(0) scale(0.98);
    }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
        .create-page {
            padding: 24px 16px 60px;
        }

        .form-card {
            padding: 24px 20px;
            border-radius: 16px;
        }

        .form-grid {
            grid-template-columns: 1fr;
        }

        .page-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .header-text h2 {
            font-size: 22px;
        }

        .submit-area {
            flex-direction: column-reverse;
        }

        .btn-cancel, .btn-submit {
            width: 100%;
            justify-content: center;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="create-page">

    <!-- Page Header -->
    <div class="page-header">
        <div class="header-icon">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="header-text">
            <h2>Create New Order</h2>
            <p>Fill in the details below to generate a new production order</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <form method="POST" id="order-form">
            {% csrf_token %}

            <!-- Section: Order Info -->
            <div class="form-section">
                <div class="section-label">
                    <span class="sec-icon"><i class="fa-solid fa-hashtag"></i></span>
                    <span class="sec-text">Order Information</span>
                </div>
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Order No / Name <span class="req">*</span></label>
                        <input type="text" name="order_name" id="order_name"
                               placeholder="e.g. 001 or Gold Ring - Project A" required>
                    </div>
                </div>
            </div>

            <!-- Section: Classification -->
            <div class="form-section">
                <div class="section-label">
                    <span class="sec-icon" style="background:#fef3c7;color:#d97706">
                        <i class="fa-solid fa-tags"></i>
                    </span>
                    <span class="sec-text">Classification</span>
                </div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Order Type</label>
                        <div class="select-wrap">
                            <select name="order_type" id="order_type">
                                {% for val, label in order_types %}
                                    <option value="{{ val }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <div class="select-wrap">
                            <select name="category" id="category">
                                {% for val, label in categories %}
                                    <option value="{{ val }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Style Type</label>
                        <div class="select-wrap">
                            <select name="style_type" id="style_type">
                                {% for val, label in style_types %}
                                    <option value="{{ val }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Quantity</label>
                        <div class="qty-stepper">
                            <button type="button" class="qty-btn" id="qty-minus">&minus;</button>
                            <input type="number" name="quantity" id="quantity" min="1" value="1">
                            <button type="button" class="qty-btn" id="qty-plus">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Section: Schedule -->
            <div class="form-section">
                <div class="section-label">
                    <span class="sec-icon" style="background:#ecfdf5;color:#059669">
                        <i class="fa-solid fa-calendar-days"></i>
                    </span>
                    <span class="sec-text">Schedule</span>
                </div>
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Start Date <span class="req">*</span></label>
                        <input type="date" name="start_date" id="start_date" required>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="submit-area">
                <a href="/index" class="btn-cancel">
                    <i class="fa-solid fa-arrow-left fa-sm"></i> Cancel
                </a>
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane fa-sm"></i> Create Order
                </button>
            </div>
        </form>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set today as default start date
    var sd = document.getElementById('start_date');
    if (sd && !sd.value) {
        sd.value = new Date().toISOString().slice(0, 10);
    }

    // Quantity stepper
    var qtyInput = document.getElementById('quantity');
    var qtyMinus = document.getElementById('qty-minus');
    var qtyPlus = document.getElementById('qty-plus');

    if (qtyMinus && qtyPlus && qtyInput) {
        qtyMinus.addEventListener('click', function() {
            var val = parseInt(qtyInput.value, 10) || 1;
            if (val > 1) qtyInput.value = val - 1;
        });
        qtyPlus.addEventListener('click', function() {
            var val = parseInt(qtyInput.value, 10) || 0;
            qtyInput.value = val + 1;
        });
    }

    // Form submit loading state
    var form = document.getElementById('order-form');
    if (form) {
        form.addEventListener('submit', function() {
            var btn = form.querySelector('.btn-submit');
            if (btn) {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin fa-sm"></i> Creating...';
                btn.style.pointerEvents = 'none';
                btn.style.opacity = '0.7';
            }
        });
    }
});
</script>

{% endblock %}
