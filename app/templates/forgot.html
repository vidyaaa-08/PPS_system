{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #0f2b4a 70%, #0a1628 100%);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* Animated background blobs */
    body::before,
    body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.15;
        animation: floatBlob 12s ease-in-out infinite alternate;
    }

    body::before {
        width: 500px;
        height: 500px;
        background: #1a5276;
        top: -150px;
        right: -100px;
    }

    body::after {
        width: 400px;
        height: 400px;
        background: #2980b9;
        bottom: -120px;
        left: -80px;
        animation-delay: -6s;
    }

    @keyframes floatBlob {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(30px, -20px) scale(1.1); }
        100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    .forgot-box {
        width: 440px;
        margin: 40px auto;
        padding: 40px 36px;
        background: rgba(13, 27, 50, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 16px;
        border: 1px solid rgba(41, 128, 185, 0.2);
        box-shadow:
            0 4px 30px rgba(0, 0, 0, 0.4),
            0 0 60px rgba(41, 128, 185, 0.08),
            inset 0 1px 0 rgba(255, 255, 255, 0.05);
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Icon circle */
    .forgot-box .icon-circle {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, #1a5276, #2980b9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(41, 128, 185, 0.3);
        animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(41, 128, 185, 0.3); }
        50%      { box-shadow: 0 4px 30px rgba(41, 128, 185, 0.5); }
    }

    .forgot-box .icon-circle svg {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: #e0ecf5;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .forgot-box h2 {
        text-align: center;
        margin-bottom: 6px;
        color: #e8f0f8;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.3px;
    }

    .forgot-box .subtitle {
        text-align: center;
        color: #7a9bbd;
        font-size: 14px;
        margin-bottom: 28px;
        line-height: 1.5;
    }

    .input-group {
        margin-bottom: 20px;
        position: relative;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #a3c4dc;
        font-size: 13px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
    }

    .input-group .input-wrapper {
        position: relative;
    }

    .input-group .input-wrapper svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        stroke: #5a8aad;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.3s ease;
        pointer-events: none;
    }

    .input-group input {
        width: 100%;
        padding: 13px 14px 13px 44px;
        background: rgba(10, 22, 40, 0.7);
        border: 1px solid rgba(41, 128, 185, 0.2);
        border-radius: 10px;
        color: #e0ecf5;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        outline: none;
        box-sizing: border-box;
    }

    .input-group input::placeholder {
        color: #4a7291;
    }

    .input-group input:focus {
        border-color: #2980b9;
        background: rgba(10, 22, 40, 0.9);
        box-shadow:
            0 0 0 3px rgba(41, 128, 185, 0.15),
            0 0 20px rgba(41, 128, 185, 0.1);
    }

    .input-group input:focus + svg,
    .input-group input:focus ~ svg {
        stroke: #2980b9;
    }

    .input-group .input-wrapper:focus-within svg {
        stroke: #2980b9;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #1a5276, #2980b9);
        color: #e8f0f8;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.3px;
        margin-top: 6px;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s ease;
    }

    .btn:hover {
        background: linear-gradient(135deg, #1e6090, #3498db);
        box-shadow: 0 4px 25px rgba(41, 128, 185, 0.4);
        transform: translateY(-1px);
    }

    .btn:hover::before {
        left: 100%;
    }

    .btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 10px rgba(41, 128, 185, 0.3);
    }

    .message {
        text-align: center;
        margin-bottom: 14px;
        font-weight: 600;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .success {
        color: #2ecc71;
        background: rgba(46, 204, 113, 0.1);
        border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .error {
        color: #e74c3c;
        background: rgba(231, 76, 60, 0.1);
        border: 1px solid rgba(231, 76, 60, 0.2);
    }

    /* Password strength bar */
    .strength-bar {
        height: 3px;
        border-radius: 3px;
        margin-top: 8px;
        background: rgba(41, 128, 185, 0.1);
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .strength-bar.visible {
        opacity: 1;
    }

    .strength-bar .bar-fill {
        height: 100%;
        border-radius: 3px;
        width: 0%;
        transition: all 0.4s ease;
    }

    .strength-bar .bar-fill.weak   { width: 33%; background: #e74c3c; }
    .strength-bar .bar-fill.medium { width: 66%; background: #f39c12; }
    .strength-bar .bar-fill.strong { width: 100%; background: #2ecc71; }

    .strength-text {
        font-size: 11px;
        margin-top: 4px;
        transition: color 0.3s ease;
    }

    .strength-text.weak   { color: #e74c3c; }
    .strength-text.medium { color: #f39c12; }
    .strength-text.strong { color: #2ecc71; }

    /* Toggle password visibility */
    .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
    }

    .toggle-password svg {
        width: 18px;
        height: 18px;
        stroke: #5a8aad;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: stroke 0.3s ease;
    }

    .toggle-password:hover svg {
        stroke: #2980b9;
    }

    /* Divider */
    .divider {
        display: flex;
        align-items: center;
        margin: 24px 0;
    }

    .divider span {
        color: #4a7291;
        font-size: 12px;
        padding: 0 12px;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(41, 128, 185, 0.15);
    }

    /* Back link */
    .back-link {
        text-align: center;
        margin-top: 24px;
    }

    .back-link a {
        color: #5a8aad;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s ease;
    }

    .back-link a:hover {
        color: #2980b9;
    }

    .back-link svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        vertical-align: middle;
        margin-right: 4px;
    }
</style>

<div class="forgot-box">

    <!-- Lock icon -->
    <div class="icon-circle">
        <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </div>

    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your username and set a new password below.</p>

    {% if messages %}
        {% for message in messages %}
            <p class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <form method="POST" id="resetForm">
        {% csrf_token %}

        <div class="input-group">
            <label>Username</label>
            <div class="input-wrapper">
                <input type="text" name="username" placeholder="Enter your username" required>
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="input-group">
            <label>New Password</label>
            <div class="input-wrapper">
                <input type="password" name="new_password" id="new_password" placeholder="Enter new password" required>
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button type="button" class="toggle-password" data-target="new_password">
                    <svg viewBox="0 0 24 24" class="eye-icon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div class="strength-bar" id="strengthBar">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm new password" required>
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <button type="button" class="toggle-password" data-target="confirm_password">
                    <svg viewBox="0 0 24 24" class="eye-icon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn">
            Reset Password
        </button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="back-link">
        <a href="{% url 'signin' %}">
            <svg viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to Login
        </a>
    </div>

</div>

<script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var targetId = this.getAttribute('data-target');
            var input = document.getElementById(targetId);
            var eyeIcon = this.querySelector('.eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                input.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        });
    });

    // Password strength checker
    var newPasswordInput = document.getElementById('new_password');
    var strengthBar = document.getElementById('strengthBar');
    var barFill = document.getElementById('barFill');
    var strengthText = document.getElementById('strengthText');

    newPasswordInput.addEventListener('input', function() {
        var val = this.value;
        if (val.length === 0) {
            strengthBar.classList.remove('visible');
            strengthText.textContent = '';
            barFill.className = 'bar-fill';
            return;
        }

        strengthBar.classList.add('visible');

        var score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        barFill.className = 'bar-fill';
        strengthText.className = 'strength-text';

        if (score <= 2) {
            barFill.classList.add('weak');
            strengthText.classList.add('weak');
            strengthText.textContent = 'Weak password';
        } else if (score <= 3) {
            barFill.classList.add('medium');
            strengthText.classList.add('medium');
            strengthText.textContent = 'Medium password';
        } else {
            barFill.classList.add('strong');
            strengthText.classList.add('strong');
            strengthText.textContent = 'Strong password';
        }
    });

    // Confirm password match check
    var confirmInput = document.getElementById('confirm_password');
    confirmInput.addEventListener('input', function() {
        if (this.value && this.value !== newPasswordInput.value) {
            this.style.borderColor = 'rgba(231, 76, 60, 0.5)';
        } else if (this.value && this.value === newPasswordInput.value) {
            this.style.borderColor = 'rgba(46, 204, 113, 0.5)';
        } else {
            this.style.borderColor = '';
        }
    });

    // Form submit validation
    document.getElementById('resetForm').addEventListener('submit', function(e) {
        var newPwd = newPasswordInput.value;
        var confirmPwd = confirmInput.value;

        if (newPwd !== confirmPwd) {
            e.preventDefault();
            // Remove existing mismatch messages
            var existing = document.querySelector('.mismatch-msg');
            if (existing) existing.remove();

            var msg = document.createElement('p');
            msg.className = 'message error mismatch-msg';
            msg.textContent = 'Passwords do not match.';
            this.insertBefore(msg, this.firstChild);
        }
    });
</script>

{% endblock %}
