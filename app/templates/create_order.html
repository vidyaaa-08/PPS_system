{% extends 'base.html' %}

{% block title %}Create Order{% endblock %}

{% block css %}
<style>
    .order-container{
        max-width:700px;
        margin:40px auto;
        padding:22px;
    }

    .order-card{
        background:#fff;
        padding:30px;
        border-radius:18px;
        box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    .order-title{
        font-size:28px;
        font-weight:700;
        margin-bottom:8px;
        color:#222;
    }

    .order-subtitle{
        color:#777;
        margin-bottom:30px;
        font-size:14px;
    }

    .form-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:20px;
    }

    .full{
        grid-column:1/-1;
    }

    .form-group{
        display:flex;
        flex-direction:column;
    }

    .form-group label{
        margin-bottom:8px;
        font-size:14px;
        font-weight:600;
        color:#444;
    }

    .form-control{
        width:100%;
        padding:12px 14px;
        border:1px solid #ddd;
        border-radius:10px;
        font-size:14px;
        outline:none;
        transition:0.3s;
        background:#f9fafb;
    }

    .form-control:focus{
        border-color:#6366f1;
        background:#fff;
        box-shadow:0 0 0 3px rgba(99,102,241,0.15);
    }

    .qty-box{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .qty-btn{
        width:40px;
        height:40px;
        border:none;
        border-radius:10px;
        background:#6366f1;
        color:#fff;
        font-size:18px;
        cursor:pointer;
    }

    .qty-input{
        text-align:center;
    }

    .btn-area{
        display:flex;
        justify-content:flex-end;
        gap:12px;
        margin-top:30px;
    }

    .btn{
        padding:12px 22px;
        border:none;
        border-radius:10px;
        font-weight:600;
        cursor:pointer;
        text-decoration:none;
        transition:0.3s;
    }

    .btn-cancel{
        background:#dcbebe;
        color:#333;
    }

    .btn-submit{
        background:#6366f1;
        color:#fff;
    }

    .btn-submit:hover{
        background:#4f46e5;
    }

    @media(max-width:600px){
        .form-grid{
            grid-template-columns:1fr;
        }

        .btn-area{
            flex-direction:column;
        }

        .btn{
            width:100%;
            text-align:center;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="order-container">

    <div class="order-card">

        <div class="order-title">Create Order</div>
        <div class="order-subtitle">
            Fill order details below
        </div>

        <form method="POST" id="orderForm">
            {% csrf_token %}

            <div class="form-grid">

                <!-- Order Name -->
                <div class="form-group full">
                    <label>Order Name</label>
                    <input type="text"
                           name="order_name"
                           class="form-control"
                           placeholder="Enter order name"
                           required>
                </div>

                <!-- Order Type -->
                <div class="form-group">
                    <label>Order Type</label>
                    <select name="order_type" class="form-control">
                        {% for val, label in order_types %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" class="form-control">
                        {% for val, label in categories %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Style -->
                <div class="form-group">
                    <label>Style Type</label>
                    <select name="style_type" class="form-control">
                        {% for val, label in style_types %}
                        <option value="{{ val }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Quantity -->
                <div class="form-group">
                    <label>Quantity</label>

                    <div class="qty-box">
                        <button type="button" class="qty-btn" id="minus">-</button>

                        <input type="number"
                               name="quantity"
                               id="quantity"
                               value="1"
                               min="1"
                               class="form-control qty-input">

                        <button type="button" class="qty-btn" id="plus">+</button>
                    </div>
                </div>

                <!-- Start Date -->
                <div class="form-group full">
                    <label>Start Date</label>
                    <input type="date"
                           name="start_date"
                           id="start_date"
                           class="form-control"
                           required>
                </div>

            </div>

            <!-- Buttons -->
            <div class="btn-area">
                <a href="/index" class="btn btn-cancel">
                    Cancel
                </a>

                <button type="submit" class="btn btn-submit">
                    Create Order
                </button>
            </div>

        </form>

    </div>

</div>

<script>
    // Default Date
    document.getElementById('start_date').value =
        new Date().toISOString().split('T')[0];

    // Quantity Buttons
    let qty = document.getElementById('quantity');

    document.getElementById('plus').onclick = () => {
        qty.value = parseInt(qty.value) + 1;
    };

    document.getElementById('minus').onclick = () => {
        if(parseInt(qty.value) > 1){
            qty.value = parseInt(qty.value) - 1;
        }
    };
</script>

{% endblock %}
