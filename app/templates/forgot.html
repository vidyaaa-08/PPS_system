{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<style>
    /* Fully responsive centered layout */
    .auth-page{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:flex-start;
        padding:24px 16px;
        min-height:calc(100vh - 68px);
    }

    .forgot-box{
        width:100%;
        max-width:440px;
        margin:0;
        padding:24px;
        background:white;
        border-radius:12px;
        box-shadow:0 8px 24px rgba(16,24,40,0.08), 0 0 0 1px rgba(0,0,0,0.03);
    }

    .forgot-box h2{
        text-align:center;
        margin-bottom:16px;
        font-size:20px;
        color:#0f1724;
    }

    .input-group{margin-bottom:14px;}

    .input-group label{
        display:block;
        margin-bottom:6px;
        font-weight:700;
        color:#334155;
        font-size:13.5px;
    }

    .input-group input{
        width:100%;
        padding:12px 12px;
        border:1px solid #d1d5db;
        border-radius:10px;
        outline:none;
        background:#fafbfc;
        font-size:15px; /* iOS/Android zoom fix */
        transition:border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .input-group input:focus{
        border-color:#16a34a;
        box-shadow:0 0 0 4px rgba(34,197,94,0.14);
        background:#fff;
    }

    .btn{
        width:100%;
        padding:12px;
        margin-top:6px;
        background:linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
        color:white;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-weight:800;
        font-size:15px;
        transition:transform 0.05s ease, filter 0.15s ease, box-shadow 0.15s ease;
        box-shadow:0 6px 18px rgba(34,197,94,0.22);
    }

    .btn:hover{filter:brightness(1.05);}
    .btn:active{transform:translateY(1px); filter:brightness(0.98);}

    .message{
        text-align:center;
        margin-bottom:12px;
        font-weight:700;
        padding:10px 12px;
        border-radius:10px;
        font-size:14px;
        border:1px solid transparent;
    }

    .success{
        color:#065f46;
        background:#dcfce7;
        border-color:#bbf7d0;
    }

    .error{
        color:#991b1b;
        background:#fee2e2;
        border-color:#fecaca;
    }

    /* Small screens */
    @media (max-width: 480px){
        .forgot-box{padding:18px;}
        .forgot-box h2{font-size:18px;}
    }
</style>

<div class="auth-page">
    <div class="forgot-box">
        <h2>Forgot Password</h2>

        {% if messages %}
            {% for message in messages %}
                <p class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input type="password" name="new_password" required placeholder="Create a new password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>
        <div style="text-align:center; margin-top:16px; font-size:14px; color:#334155;">
            Remembered it? 
            <a href="{% url 'signin' %}" style="color:#16a34a; font-weight:800; text-decoration:none;">
                Sign in
            </a>
        </div>
    </div>
</div>


{% endblock %}
