{% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block css %}

<style>

    .hero-section{
        width:100%;
        height:85vh;
        position:relative;
        overflow:hidden;
        border-radius:20px;
    }

    .slide{
        position:absolute;
        width:100%;
        height:100%;
        opacity:0;
        transition:1s;
    }

    .slide img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .active{
        opacity:1;
    }

    .overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.45);

        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;

        color:white;
        text-align:center;
        padding:20px;
    }

    .overlay h1{
        font-size:60px;
        margin-bottom:20px;
    }

    .overlay p{
        font-size:22px;
        max-width:800px;
        line-height:1.6;
    }

    .overlay a{
        margin-top:30px;
        padding:14px 35px;
        background:#2563eb;
        color:white;
        text-decoration:none;
        border-radius:10px;
        font-size:18px;
        transition:0.3s;
    }

    .overlay a:hover{
        background:#1d4ed8;
    }

    @media(max-width:768px){

        .hero-section{
            height:70vh;
        }

        .overlay h1{
            font-size:38px;
        }

        .overlay p{
            font-size:18px;
        }

    }

</style>

{% endblock %}

{% block content %}

<div class="hero-section">

    <div class="slide active">

        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop" alt="">

        <div class="overlay">

        </div>

    </div>

    <div class="slide">

        <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1600&auto=format&fit=crop" alt="">

        <div class="overlay">
           
        </div>

    </div>

    <div class="slide">

        <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1600&auto=format&fit=crop" alt="">

        <div class="overlay">
        </div>

    </div>

</div>

<script>

    let slides = document.querySelectorAll('.slide');

    let index = 0;

    function showSlides(){

        slides.forEach((slide)=>{

            slide.classList.remove('active');

        });

        index++;

        if(index >= slides.length){

            index = 0;

        }

        slides[index].classList.add('active');

    }

    setInterval(showSlides,3000);

</script>

{% endblock %}
